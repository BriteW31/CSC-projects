<div class="inventory-tool-container">
  <h2>Bulk Remove Shopify Locations</h2>
  <p>Upload your modified CSV to sever locations marked as "not stocked".</p>

  <div class="upload-section">
    <input 
      type="file" 
      accept=".csv" 
      (change)="onFileSelected($event)" 
      [disabled]="isParsing || isUploading"
    />
  </div>

  <div *ngIf="isParsing" class="status-message">
    Parsing CSV... please wait.
  </div>

  <div *ngIf="errorMessage" class="error-message" style="color: red;">
    <strong>Error:</strong> {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" class="success-message" style="color: green;">
    <strong>Success:</strong> {{ successMessage }}
  </div>

  <div *ngIf="parsedData.length > 0 && !isParsing" class="action-section">
    <p>Found <strong>{{ parsedData.length }}</strong> items to remove.</p>
    
    <button 
      (click)="syncWithShopify()" 
      [disabled]="isUploading">
      {{ isUploading ? 'Syncing with Shopify...' : 'Execute Removal' }}
    </button>
  </div>
</div>
