<div class="credentials-section" style="margin-bottom: 20px; padding: 15px; border: 1px solid #ccc;">
    <h3>Shopify Credentials</h3>
    
    <div style="margin-bottom: 10px;">
      <label>Store URL (e.g., your-store.myshopify.com): </label><br>
      <input type="text" [(ngModel)]="storeUrl" placeholder="store.myshopify.com" style="width: 300px;">
    </div>

    <div style="margin-bottom: 10px;">
      <label>Admin API Access Token: </label><br>
      <input type="password" [(ngModel)]="accessToken" placeholder="shpat_..." style="width: 300px;">
    </div>

    <div>
      <label>API Version: </label><br>
      <input type="text" [(ngModel)]="apiVersion" style="width: 100px;">
    </div>
  </div>
